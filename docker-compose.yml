services:
  tuwunel:
    container_name: tuwunel
    # image: ghcr.io/matrix-construct/tuwunel:latest
    image: jevolk/tuwunel:latest
    restart: unless-stopped
    volumes:
      - data:/var/lib/tuwunel
    networks:
      - proxy
    environment:
      TUWUNEL_SERVER_NAME: ${SERVER_NAME}
      TUWUNEL_PORT: ${TUWUNEL_PORT:-6167}
      TUWUNEL_ADDRESS: 0.0.0.0
      TUWUNEL_DATABASE_PATH: /var/lib/tuwunel
      TUWUNEL_ALLOW_REGISTRATION: ${TUWUNEL_ALLOW_REGISTRATION:-false}
      TUWUNEL_REGISTRATION_TOKEN: ${TUWUNEL_REGISTRATION_TOKEN}
      TUWUNEL_TRUSTED_SERVERS: ${TUWUNEL_TRUSTED_SERVERS:-["matrix.org"]}
      TUWUNEL_LOG: ${TUWUNEL_LOG:-warn}
      TUWUNEL_MAX_REQUEST_SIZE: ${TUWUNEL_MAX_REQUEST_SIZE:-20971520}
      TUWUNEL_ALLOW_LEGACY_MEDIA: ${TUWUNEL_ALLOW_LEGACY_MEDIA:-true}
      TUWUNEL_TURN_URIS: '["turn:${SERVER_NAME}:3478?transport=udp", "turn:${SERVER_NAME}:3478?transport=tcp", "turns:${SERVER_NAME}:5349?transport=tcp"]'
      TUWUNEL_TURN_SECRET: ${TURN_SECRET}
      TUWUNEL_TURN_TTL: ${TUWUNEL_TURN_TTL:-86400}
      TUWUNEL_WELL_KNOWN: |
        {
          client=https://${SERVER_NAME},
          server=${SERVER_NAME}:443,
          rtc_transports=[{type="livekit", livekit_service_url="https://${LIVEKIT_SUBDOMAIN:-livekit}.${SERVER_NAME}"}]
        }
    ulimits:
      nofile:
        soft: 1048567
        hard: 1048567
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homeserver.rule=Host(`${SERVER_NAME}`)"
      - "traefik.http.routers.homeserver.entrypoints=websecure"
      - "traefik.http.routers.homeserver.tls=true"
      - "traefik.http.routers.homeserver.tls.certresolver=letsencrypt"
      - "traefik.http.services.homeserver.loadbalancer.server.port=${TUWUNEL_PORT:-6167}"
      - "traefik.http.middlewares.cors.headers.accessControlAllowOriginList=*"
      - "traefik.http.middlewares.cors.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.cors.headers.accessControlAllowHeaders=Origin,X-Requested-With,Content-Type,Accept,Authorization"
      - "traefik.http.routers.homeserver.middlewares=cors"

  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    restart: unless-stopped
    tty: true
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
    depends_on:
      traefik-certs-dumper:
        condition: service_started
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "${TURN_MIN_PORT:-50201}-${TURN_MAX_PORT:-50400}:${TURN_MIN_PORT:-50201}-${TURN_MAX_PORT:-50400}/udp"
    volumes:
      - certs:/certs:ro
    networks:
      - proxy
    command:
      - -n
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      - --realm=${SERVER_NAME}
      - --listening-port=3478
      - --tls-listening-port=5349
      - --min-port=${TURN_MIN_PORT:-50201}
      - --max-port=${TURN_MAX_PORT:-50400}
      - --no-cli
      - --cert=/certs/${SERVER_NAME}/certificate.crt
      - --pkey=/certs/${SERVER_NAME}/privatekey.key
      - --external-ip=${TURN_EXTERNAL_IP}
      - -v

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    configs:
      - source: livekit.yaml
        target: /etc/livekit.yaml
    command: --config /etc/livekit.yaml
    ports:
      - "7881:7881/tcp"
      - "${LIVEKIT_PORT_RANGE_START:-50100}-${LIVEKIT_PORT_RANGE_END:-50200}:${LIVEKIT_PORT_RANGE_START:-50100}-${LIVEKIT_PORT_RANGE_END:-50200}/udp"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.livekit.rule=Host(`${LIVEKIT_SUBDOMAIN:-livekit}.${SERVER_NAME}`)"
      - "traefik.http.routers.livekit.entrypoints=websecure"
      - "traefik.http.routers.livekit.tls=true"
      - "traefik.http.routers.livekit.tls.certresolver=letsencrypt"
      - "traefik.http.services.livekit.loadbalancer.server.port=7880"

  livekit-jwt:
    image: ghcr.io/element-hq/lk-jwt-service:latest
    container_name: livekit-jwt
    restart: unless-stopped
    depends_on:
      - livekit
    networks:
      - proxy
    environment:
      LIVEKIT_JWT_BIND: ":8080"
      LIVEKIT_URL: "wss://${LIVEKIT_SUBDOMAIN:-livekit}.${SERVER_NAME}"
      LIVEKIT_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_FULL_ACCESS_HOMESERVERS: ${SERVER_NAME}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.livekit-jwt.rule=Host(`${LIVEKIT_SUBDOMAIN:-livekit}.${SERVER_NAME}`) && (PathPrefix(`/sfu/get`) || PathPrefix(`/healthz`) || PathPrefix(`/get_token`))"
      - "traefik.http.routers.livekit-jwt.entrypoints=websecure"
      - "traefik.http.routers.livekit-jwt.tls=true"
      - "traefik.http.routers.livekit-jwt.tls.certresolver=letsencrypt"
      - "traefik.http.services.livekit-jwt.loadbalancer.server.port=8080"

  traefik-certs-dumper:
    image: ldez/traefik-certs-dumper:latest
    container_name: traefik-certs-dumper
    restart: unless-stopped
    volumes:
      - acme:/traefik:ro
      - certs:/output
    command:
      - file
      - --version=v2
      - --source=/traefik/acme.json
      - --dest=/output
      - --domain-subdir
      - --watch

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "acme:/etc/traefik/acme"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.redirs.rule=hostregexp(`{host:.+}`)"
      - "traefik.http.routers.redirs.entrypoints=web"
      - "traefik.http.routers.redirs.middlewares=redirect-to-https"
    configs:
      - source: dynamic.yml
        target: /etc/traefik/dynamic.yml
    environment:
      TRAEFIK_ENTRYPOINTS_WEB: true
      TRAEFIK_ENTRYPOINTS_WEB_ADDRESS: ":80"
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_TO: websecure

      TRAEFIK_ENTRYPOINTS_WEBSECURE: true
      TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS: ":443"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_CERTRESOLVER: letsencrypt

      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT: true
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: ${ACME_EMAIL}
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_KEYTYPE: EC384
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_HTTPCHALLENGE: true
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_HTTPCHALLENGE_ENTRYPOINT: web
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_STORAGE: "/etc/traefik/acme/acme.json"

      TRAEFIK_PROVIDERS_DOCKER: true
      TRAEFIK_PROVIDERS_DOCKER_ENDPOINT: "unix:///var/run/docker.sock"
      TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT: false

      TRAEFIK_PROVIDERS_FILE: true
      TRAEFIK_PROVIDERS_FILE_FILENAME: "/etc/traefik/dynamic.yml"

      TRAEFIK_LOG_LEVEL: ${TRAEFIK_LOG_LEVEL:-ERROR}

configs:
  livekit.yaml:
    content: |
      port: 7880
      bind_addresses:
        - ""
      rtc:
        tcp_port: 7881
        port_range_start: ${LIVEKIT_PORT_RANGE_START:-50100}
        port_range_end: ${LIVEKIT_PORT_RANGE_END:-50200}
        use_external_ip: true
        enable_loopback_candidate: false
        turn_servers:
          - host: ${SERVER_NAME}
            port: 5349
            protocol: tls
            secret: "${TURN_SECRET}"
      keys:
        ${LIVEKIT_API_KEY}: "${LIVEKIT_API_SECRET}"
  dynamic.yml:
    content: |
      tls:
        options:
          default:
            cipherSuites:
              - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
              - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
              - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
              - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
              - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
              - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
            minVersion: VersionTLS12

volumes:
  data:
  acme:
  certs:

networks:
  proxy:
