services:
  tuwunel:
    environment:
      TUWUNEL_WELL_KNOWN: |
        {
          client=https://${SERVER_NAME},
          server=${SERVER_NAME}:443,
          rtc_transports=[{type="livekit", livekit_service_url="https://${LIVEKIT_SUBDOMAIN:-livekit}.${SERVER_NAME}"}]
        }

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    configs:
      - source: livekit.yaml
        target: /etc/livekit.yaml
    command: --config /etc/livekit.yaml
    ports:
      - "7881:7881/tcp"
      - "${LIVEKIT_PORT_RANGE_START:-50100}-${LIVEKIT_PORT_RANGE_END:-50200}:${LIVEKIT_PORT_RANGE_START:-50100}-${LIVEKIT_PORT_RANGE_END:-50200}/udp"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.livekit.rule=Host(`${LIVEKIT_SUBDOMAIN:-livekit}.${SERVER_NAME}`)"
      - "traefik.http.routers.livekit.entrypoints=websecure"
      - "traefik.http.routers.livekit.tls=true"
      - "traefik.http.routers.livekit.tls.certresolver=letsencrypt"
      - "traefik.http.services.livekit.loadbalancer.server.port=7880"

  livekit-jwt:
    image: ghcr.io/element-hq/lk-jwt-service:latest
    container_name: livekit-jwt
    restart: unless-stopped
    depends_on:
      - livekit
    networks:
      - proxy
    environment:
      LIVEKIT_JWT_BIND: ":8080"
      LIVEKIT_URL: "wss://${LIVEKIT_SUBDOMAIN:-livekit}.${SERVER_NAME}"
      LIVEKIT_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_FULL_ACCESS_HOMESERVERS: ${SERVER_NAME}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.livekit-jwt.rule=Host(`${LIVEKIT_SUBDOMAIN:-livekit}.${SERVER_NAME}`) && (PathPrefix(`/sfu/get`) || PathPrefix(`/healthz`) || PathPrefix(`/get_token`))"
      - "traefik.http.routers.livekit-jwt.entrypoints=websecure"
      - "traefik.http.routers.livekit-jwt.tls=true"
      - "traefik.http.routers.livekit-jwt.tls.certresolver=letsencrypt"
      - "traefik.http.services.livekit-jwt.loadbalancer.server.port=8080"

configs:
  livekit.yaml:
    content: |
      port: 7880
      bind_addresses:
        - ""
      rtc:
        tcp_port: 7881
        port_range_start: ${LIVEKIT_PORT_RANGE_START:-50100}
        port_range_end: ${LIVEKIT_PORT_RANGE_END:-50200}
        use_external_ip: true
        enable_loopback_candidate: false
        turn_servers:
          - host: ${SERVER_NAME}
            port: 5349
            protocol: tls
            secret: "${TURN_SECRET}"
      keys:
        ${LIVEKIT_API_KEY}: "${LIVEKIT_API_SECRET}"

networks:
  proxy:
    external: true
